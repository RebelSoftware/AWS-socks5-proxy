services:
  # The async HTTP proxy that dynamically updates SOCKS5 upstream
  http-proxy:
    build: ./async-proxy
    container_name: http-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"  # HTTP proxy port
    environment:
      - LISTEN_HOST=0.0.0.0
      - LISTEN_PORT=8080
      - ORCHESTRATOR_URL=http://orchestrator:5000
      - CHECK_INTERVAL=30
      - LOG_LEVEL=INFO
      # Proxy authentication (from .env)
      - REQUIRE_AUTH=${REQUIRE_AUTH:-false}
      - PROXY_USER=${PROXY_USER:-}
      - PROXY_PASSWORD=${PROXY_PASSWORD:-}
    depends_on:
      - orchestrator
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Fargate orchestrator - uses restricted IAM user 'proxy-orchestrator'
  # Credentials are provided via .env (generated by setup.sh)
  orchestrator:
    build:
      context: ./proxy-orchestrator
      dockerfile: Dockerfile
    container_name: proxy-orchestrator
    restart: unless-stopped
    ports:
      - "5000:5000"  # Management API
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - ECS_CLUSTER=${ECS_CLUSTER:-proxy-cluster}
      - ECS_TASK_DEFINITION=${ECS_TASK_DEFINITION:-go-socks5-proxy}
      - TASK_SUBNET=${TASK_SUBNET}
      - TASK_SECURITY_GROUP=${TASK_SECURITY_GROUP}
      - SOCKS5_PORT=1080
      - LOG_LEVEL=INFO
      # IP Allowlist configuration
      - IP_ALLOWLIST_ENABLED=${IP_ALLOWLIST_ENABLED:-false}
      - CLIENT_SECURITY_GROUP_ID=${CLIENT_SECURITY_GROUP_ID}
      - DUAL_IP_RETENTION_MINUTES=${DUAL_IP_RETENTION_MINUTES:-180}
    env_file:
      - .env
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/status"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  proxy-network:
    driver: bridge